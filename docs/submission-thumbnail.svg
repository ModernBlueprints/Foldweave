<svg xmlns="http://www.w3.org/2000/svg" width="1500" height="1000" viewBox="0 0 1500 1000" role="img" aria-labelledby="title description">
  <title id="title">Reversible Name Atlas</title>
  <desc id="description">A dark product card showing Sofia describing a folder change once, a payload-free Name Atlas Change File, and Martin applying the verified change to an equivalent local project without another GPT call.</desc>
  <defs>
    <linearGradient id="background" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#0c1118"/>
      <stop offset="0.58" stop-color="#111923"/>
      <stop offset="1" stop-color="#0d141d"/>
    </linearGradient>
    <linearGradient id="blue" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#4c90ff"/>
      <stop offset="1" stop-color="#68b5ff"/>
    </linearGradient>
    <linearGradient id="file" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#163a66"/>
      <stop offset="1" stop-color="#17283d"/>
    </linearGradient>
    <pattern id="grid" width="48" height="48" patternUnits="userSpaceOnUse">
      <path d="M48 0H0V48" fill="none" stroke="#8fa1b6" stroke-opacity="0.055" stroke-width="1"/>
    </pattern>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="150%">
      <feDropShadow dx="0" dy="18" stdDeviation="24" flood-color="#000" flood-opacity="0.34"/>
    </filter>
  </defs>

  <rect width="1500" height="1000" fill="url(#background)"/>
  <rect width="1500" height="1000" fill="url(#grid)"/>
  <circle cx="1370" cy="-40" r="430" fill="#2f7fe6" opacity="0.08"/>
  <circle cx="90" cy="1050" r="390" fill="#2da866" opacity="0.055"/>
  <path d="M0 0h1500v6H0z" fill="url(#blue)"/>

  <g transform="translate(90 64)">
    <rect width="62" height="62" rx="14" fill="#17283a" stroke="#4c80ac" stroke-width="2"/>
    <text x="31" y="40" text-anchor="middle" fill="#9bcfff" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif" font-size="21" font-weight="800">NA</text>
    <text x="84" y="25" fill="#8fc5ff" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif" font-size="14" font-weight="750" letter-spacing="3">WORK &amp; PRODUCTIVITY</text>
    <text x="84" y="56" fill="#f4f7fb" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif" font-size="28" font-weight="750">Reversible Name Atlas</text>
  </g>

  <g transform="translate(90 205)">
    <text fill="#f4f7fb" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif" font-size="65" font-weight="800" letter-spacing="-1.5">Describe the change once.</text>
    <text y="76" fill="#70b8ff" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif" font-size="65" font-weight="800" letter-spacing="-1.5">Apply it wherever the same project exists.</text>
    <text y="133" fill="#aeb8c5" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif" font-size="25">AI planning once. Deterministic execution everywhere.</text>
  </g>

  <g transform="translate(90 450)" filter="url(#shadow)">
    <g>
      <rect width="350" height="325" rx="22" fill="#1a222c" stroke="#354352" stroke-width="2"/>
      <rect x="28" y="28" width="74" height="58" rx="10" fill="#182b3f" stroke="#4d7397"/>
      <path d="M38 39h25l8 9h21v28H38z" fill="#3475b9" opacity="0.82"/>
      <text x="124" y="49" fill="#8fa0b2" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif" font-size="13" font-weight="750" letter-spacing="2">SOFIA</text>
      <text x="124" y="76" fill="#f4f7fb" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif" font-size="23" font-weight="750">Apollo project</text>
      <text x="28" y="134" fill="#dbe4ee" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif" font-size="18" font-weight="650">Describes the change</text>
      <rect x="28" y="158" width="294" height="78" rx="12" fill="#111820" stroke="#303d49"/>
      <text x="45" y="187" fill="#b9c6d4" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif" font-size="15">“Prepare this project for</text>
      <text x="45" y="211" fill="#b9c6d4" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif" font-size="15">handoff as Northstar.”</text>
      <circle cx="42" cy="274" r="11" fill="#173827" stroke="#429966"/>
      <path d="M36 274l4 4 8-9" fill="none" stroke="#8fe0a9" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"/>
      <text x="64" y="280" fill="#aeb8c5" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif" font-size="15">Original folder unchanged</text>
    </g>

    <g transform="translate(475 0)">
      <rect width="350" height="325" rx="22" fill="#192331" stroke="#4c90ff" stroke-width="2.5"/>
      <path d="M134 42h63l28 28v92h-91z" fill="url(#file)" stroke="#69b1ff" stroke-width="2"/>
      <path d="M197 42v29h28" fill="none" stroke="#69b1ff" stroke-width="2"/>
      <path d="M155 91h49M155 112h49M155 133h34" fill="none" stroke="#9acbff" stroke-width="4" stroke-linecap="round" opacity="0.9"/>
      <text x="175" y="199" text-anchor="middle" fill="#8fc5ff" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif" font-size="13" font-weight="750" letter-spacing="2">NAME ATLAS CHANGE FILE</text>
      <text x="175" y="232" text-anchor="middle" fill="#f4f7fb" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif" font-size="24" font-weight="800">The verified plan</text>
      <text x="175" y="263" text-anchor="middle" fill="#aeb8c5" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif" font-size="15">No project payload bytes</text>
      <text x="175" y="287" text-anchor="middle" fill="#aeb8c5" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif" font-size="15">No API key required to apply</text>
    </g>

    <g transform="translate(950 0)">
      <rect width="350" height="325" rx="22" fill="#1a222c" stroke="#354352" stroke-width="2"/>
      <rect x="28" y="28" width="74" height="58" rx="10" fill="#18352b" stroke="#4c8b6b"/>
      <path d="M38 39h25l8 9h21v28H38z" fill="#2e9b65" opacity="0.82"/>
      <text x="124" y="49" fill="#8fa0b2" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif" font-size="13" font-weight="750" letter-spacing="2">MARTIN</text>
      <text x="124" y="76" fill="#f4f7fb" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif" font-size="23" font-weight="750">Same project, moved</text>
      <text x="28" y="134" fill="#dbe4ee" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif" font-size="18" font-weight="650">Applies the shared change</text>
      <rect x="28" y="158" width="294" height="78" rx="12" fill="#111820" stroke="#303d49"/>
      <text x="45" y="187" fill="#b9c6d4" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif" font-size="15">Different local paths.</text>
      <text x="45" y="211" fill="#b9c6d4" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif" font-size="15">Same verified result.</text>
      <circle cx="42" cy="274" r="11" fill="#173827" stroke="#429966"/>
      <path d="M36 274l4 4 8-9" fill="none" stroke="#8fe0a9" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"/>
      <text x="64" y="280" fill="#a8edbd" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif" font-size="15" font-weight="700">Verified without another GPT call</text>
    </g>

    <g transform="translate(367 137)">
      <path d="M0 20h82" fill="none" stroke="#6598c9" stroke-width="3" stroke-linecap="round"/>
      <path d="M68 7l14 13-14 13" fill="none" stroke="#6598c9" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"/>
      <text x="41" y="0" text-anchor="middle" fill="#93a5b8" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif" font-size="12" font-weight="700">GPT-5.6 PLANS</text>
      <text x="41" y="53" text-anchor="middle" fill="#93a5b8" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif" font-size="12">once</text>
    </g>

    <g transform="translate(842 137)">
      <path d="M0 20h82" fill="none" stroke="#56a579" stroke-width="3" stroke-linecap="round"/>
      <path d="M68 7l14 13-14 13" fill="none" stroke="#56a579" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"/>
      <text x="41" y="0" text-anchor="middle" fill="#93a5b8" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif" font-size="12" font-weight="700">FIXED CODE APPLIES</text>
      <text x="41" y="53" text-anchor="middle" fill="#93a5b8" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif" font-size="12">everywhere</text>
    </g>
  </g>

  <g transform="translate(90 864)">
    <rect width="1300" height="1" fill="#3a4653"/>
    <text x="0" y="48" fill="#8fa0b2" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif" font-size="15" font-weight="750" letter-spacing="2.4">LOCAL-FIRST</text>
    <circle cx="156" cy="43" r="3" fill="#4c90ff"/>
    <text x="178" y="48" fill="#8fa0b2" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif" font-size="15" font-weight="750" letter-spacing="2.4">SOURCE UNCHANGED</text>
    <circle cx="390" cy="43" r="3" fill="#4c90ff"/>
    <text x="412" y="48" fill="#8fa0b2" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif" font-size="15" font-weight="750" letter-spacing="2.4">KEYLESS RECEIVER</text>
    <circle cx="625" cy="43" r="3" fill="#4c90ff"/>
    <text x="647" y="48" fill="#8fa0b2" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif" font-size="15" font-weight="750" letter-spacing="2.4">INDEPENDENT PROOF</text>
    <text x="1300" y="48" text-anchor="end" fill="#f4f7fb" font-family="ui-monospace,SFMono-Regular,Menlo,monospace" font-size="16">name-atlas</text>
  </g>
</svg>
