<svg xmlns="http://www.w3.org/2000/svg" width="1500" height="1000" viewBox="0 0 1500 1000" role="img" aria-labelledby="title description">
  <title id="title">Reversible Name Atlas</title>
  <desc id="description">A dark project card showing a human-reviewed Migration Case becoming a Portable Change Receipt and a verified handoff.</desc>
  <defs>
    <linearGradient id="background" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#171b20"/>
      <stop offset="0.55" stop-color="#111418"/>
      <stop offset="1" stop-color="#0b0d10"/>
    </linearGradient>
    <linearGradient id="blue-glow" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#48aff0" stop-opacity="0.24"/>
      <stop offset="1" stop-color="#2d72d2" stop-opacity="0"/>
    </linearGradient>
    <pattern id="grid" width="48" height="48" patternUnits="userSpaceOnUse">
      <path d="M 48 0 L 0 0 0 48" fill="none" stroke="#8f99a8" stroke-opacity="0.055" stroke-width="1"/>
    </pattern>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="18" stdDeviation="24" flood-color="#000000" flood-opacity="0.38"/>
    </filter>
  </defs>

  <rect width="1500" height="1000" fill="url(#background)"/>
  <rect width="1500" height="1000" fill="url(#grid)"/>
  <circle cx="1310" cy="40" r="520" fill="url(#blue-glow)"/>
  <circle cx="140" cy="1030" r="420" fill="#238551" opacity="0.055"/>

  <g transform="translate(100 78)">
    <rect width="76" height="76" rx="18" fill="#2d72d2"/>
    <path d="M21 53V23h7l25 30h7V23" fill="none" stroke="#f6f7f9" stroke-width="6" stroke-linecap="round" stroke-linejoin="round"/>
    <text x="102" y="31" fill="#abb3bf" font-family="Inter, Segoe UI, sans-serif" font-size="17" font-weight="700" letter-spacing="4">WORK &amp; PRODUCTIVITY</text>
    <text x="102" y="67" fill="#f6f7f9" font-family="Inter, Segoe UI, sans-serif" font-size="30" font-weight="700">Reversible Name Atlas</text>
  </g>

  <g transform="translate(100 246)">
    <text x="0" y="0" fill="#f6f7f9" font-family="Inter, Segoe UI, sans-serif" font-size="72" font-weight="750" letter-spacing="-2">Refactor the collection.</text>
    <text x="0" y="82" fill="#48aff0" font-family="Inter, Segoe UI, sans-serif" font-size="72" font-weight="750" letter-spacing="-2">Hand over the proof.</text>
    <text x="2" y="142" fill="#abb3bf" font-family="Inter, Segoe UI, sans-serif" font-size="25" font-weight="450">Persistent human decisions. Portable receipt. Independent verification.</text>
  </g>

  <g transform="translate(100 545)" filter="url(#shadow)">
    <g>
      <rect width="370" height="232" rx="20" fill="#1c2127" stroke="#5f6b7c" stroke-width="2"/>
      <rect x="24" y="24" width="52" height="52" rx="13" fill="#d1980b" fill-opacity="0.18" stroke="#d1980b"/>
      <path d="M40 39h20v4H40zm0 10h20v4H40zm0 10h14v4H40z" fill="#fbb360"/>
      <text x="96" y="45" fill="#abb3bf" font-family="Inter, Segoe UI, sans-serif" font-size="14" font-weight="700" letter-spacing="2">01 · REVIEW</text>
      <text x="96" y="71" fill="#f6f7f9" font-family="Inter, Segoe UI, sans-serif" font-size="23" font-weight="700">Migration Case</text>
      <text x="24" y="124" fill="#f6f7f9" font-family="Inter, Segoe UI, sans-serif" font-size="18" font-weight="600">Mechanical proposals</text>
      <text x="24" y="154" fill="#abb3bf" font-family="Inter, Segoe UI, sans-serif" font-size="17">GPT frames one ambiguity.</text>
      <text x="24" y="182" fill="#abb3bf" font-family="Inter, Segoe UI, sans-serif" font-size="17">The human chooses.</text>
      <rect x="24" y="199" width="106" height="5" rx="2.5" fill="#d1980b"/>
      <rect x="138" y="199" width="208" height="5" rx="2.5" fill="#3c444f"/>
    </g>

    <g transform="translate(465 0)">
      <rect width="370" height="232" rx="20" fill="#1c2127" stroke="#2d72d2" stroke-width="2"/>
      <rect x="24" y="24" width="52" height="52" rx="13" fill="#2d72d2" fill-opacity="0.18" stroke="#48aff0"/>
      <path d="M39 38h22v26H39zM44 32h12v8H44z" fill="none" stroke="#48aff0" stroke-width="3" stroke-linejoin="round"/>
      <text x="96" y="45" fill="#abb3bf" font-family="Inter, Segoe UI, sans-serif" font-size="14" font-weight="700" letter-spacing="2">02 · RECEIPT</text>
      <text x="96" y="71" fill="#f6f7f9" font-family="Inter, Segoe UI, sans-serif" font-size="23" font-weight="700">Portable proof</text>
      <text x="24" y="124" fill="#f6f7f9" font-family="Inter, Segoe UI, sans-serif" font-size="18" font-weight="600">Path-neutral commitments</text>
      <text x="24" y="154" fill="#abb3bf" font-family="Inter, Segoe UI, sans-serif" font-size="17">Decision ledger + maps</text>
      <text x="24" y="182" fill="#abb3bf" font-family="Inter, Segoe UI, sans-serif" font-size="17">BagIt handoff + offline view</text>
      <text x="24" y="209" fill="#48aff0" font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="14">SHA-256 · 2ba5…f0509a</text>
    </g>

    <g transform="translate(930 0)">
      <rect width="370" height="232" rx="20" fill="#1c2127" stroke="#238551" stroke-width="2"/>
      <rect x="24" y="24" width="52" height="52" rx="26" fill="#238551" fill-opacity="0.2" stroke="#32a467"/>
      <path d="M38 50l8 8 16-20" fill="none" stroke="#72ca9b" stroke-width="5" stroke-linecap="round" stroke-linejoin="round"/>
      <text x="96" y="45" fill="#abb3bf" font-family="Inter, Segoe UI, sans-serif" font-size="14" font-weight="700" letter-spacing="2">03 · HANDOFF</text>
      <text x="96" y="71" fill="#f6f7f9" font-family="Inter, Segoe UI, sans-serif" font-size="23" font-weight="700">Independently verified</text>
      <text x="24" y="124" fill="#f6f7f9" font-family="Inter, Segoe UI, sans-serif" font-size="18" font-weight="600">Keyless receiver command</text>
      <text x="24" y="154" fill="#abb3bf" font-family="Inter, Segoe UI, sans-serif" font-size="17">No case, source, GPT,</text>
      <text x="24" y="182" fill="#abb3bf" font-family="Inter, Segoe UI, sans-serif" font-size="17">network, or API key.</text>
      <rect x="24" y="199" width="322" height="5" rx="2.5" fill="#238551"/>
    </g>

    <path d="M390 116h55" fill="none" stroke="#8f99a8" stroke-width="3" stroke-linecap="round"/>
    <path d="M432 104l13 12-13 12" fill="none" stroke="#8f99a8" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"/>
    <path d="M855 116h55" fill="none" stroke="#8f99a8" stroke-width="3" stroke-linecap="round"/>
    <path d="M897 104l13 12-13 12" fill="none" stroke="#8f99a8" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"/>
  </g>

  <g transform="translate(100 880)">
    <rect width="1300" height="1" fill="#5f6b7c" opacity="0.55"/>
    <text x="0" y="48" fill="#8f99a8" font-family="Inter, Segoe UI, sans-serif" font-size="15" font-weight="700" letter-spacing="3">LOCAL-FIRST</text>
    <circle cx="156" cy="43" r="3" fill="#48aff0"/>
    <text x="178" y="48" fill="#8f99a8" font-family="Inter, Segoe UI, sans-serif" font-size="15" font-weight="700" letter-spacing="3">HUMAN AUTHORITY</text>
    <circle cx="390" cy="43" r="3" fill="#48aff0"/>
    <text x="412" y="48" fill="#8f99a8" font-family="Inter, Segoe UI, sans-serif" font-size="15" font-weight="700" letter-spacing="3">DETERMINISTIC PROOF</text>
    <text x="1300" y="48" text-anchor="end" fill="#f6f7f9" font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="15">name-atlas</text>
  </g>
</svg>
